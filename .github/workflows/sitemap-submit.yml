name: Sitemap Submit

# 每天定时把站点 sitemap 提交给百度 + Google Search Console
# 也可在 Actions 页面手动触发（workflow_dispatch）

on:
  schedule:
    # 每天 UTC 02:00（北京时间 10:00）运行一次
    - cron: "0 2 * * *"
  workflow_dispatch: {}

jobs:
  submit:
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://navhub.shenzjd.com
      BAIDU_SITE: ${{ secrets.BAIDU_SITE }}
      BAIDU_TOKEN: ${{ secrets.BAIDU_TOKEN }}
      GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
      GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      GOOGLE_SITE_URL: ${{ secrets.GOOGLE_SITE_URL }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Submit sitemap to Baidu & Google
        run: node scripts/submit-sitemap.mjs
